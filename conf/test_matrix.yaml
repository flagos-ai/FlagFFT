# FlagFFT 测例参数矩阵
# 定义尺寸、批大小、缩放等参数空间
# 与 operators.yaml 配合使用，展开为具体测例

# ── 1D 尺寸定义 ────────────────────────────────────────────────

# Cooley-Tukey 平滑数（可被 {2..19} 的因数分解）
sizes_ct:
  - 16
  - 64
  - 81
  - 243
  - 256
  - 361
  - 512
  - 2048
  - 4096
  - 8192
  - 16384

# Bluestein/Rader 素数和复合数
sizes_bs:
  - 23
  - 67
  - 997
  - 1009

# ── 批大小 ─────────────────────────────────────────────────────

batches:
  - 1
  - 4
  - 256

# ── 输入缩放因子 ───────────────────────────────────────────────

scales:
  - 5.9604644775390625e-08    # 2^-24 (float32 精度下安全)
  - 1.0
  - 16777216.0                # 2^24

# ── 组合规则 ───────────────────────────────────────────────────
# 每个规则定义该算法下使用的参数空间
# sizes/batches/scales 引用上面定义的键名

combinations:
  # Cooley-Tukey 快速冒烟
  ct:
    sizes: sizes_ct
    batches: [1]
    scales: [1.0]

  # Bluestein/Rader 快速冒烟
  bs:
    sizes: sizes_bs
    batches: [1]
    scales: [1.0]

  # 完整测试（CT 尺寸，所有批大小和缩放）
  full:
    sizes: sizes_ct
    batches: batches
    scales: scales

  # 2D 测试
  2d:
    sizes:
      - [16, 16]
      - [64, 64]
      - [128, 256]
      - [256, 128]
      - [256, 256]
      - [512, 512]
      - [23, 23]
      - [997, 16]
      - [16, 997]
    batches: [1, 4]
    scales: [1.0]

  # 2D 完整测试
  2d_full:
    sizes:
      - [16, 16]
      - [64, 64]
      - [128, 256]
      - [256, 128]
      - [256, 256]
      - [512, 512]
      - [23, 23]
      - [997, 16]
      - [16, 997]
    batches: batches
    scales: scales
